<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約操作 · 簡訊多模板（NPOS 模擬）</title>
<style>
  :root{
    --blue:#2563EB;--blue-deep:#1D4ED8;--blue-wash:#EAF1FE;
    --side:#26313f;--side-2:#2f3c4d;--side-text:#c2ccd6;--side-active:#3b86f7;
    --ink:#1f2933;--muted:#5b6770;--faint:#8a949c;
    --line:#e3e7eb;--line-strong:#cfd6dc;--surface:#fff;--surface-2:#f5f7f9;
    --danger:#dc3545;--danger-wash:#fdecec;--danger-line:#f5c2c2;
    --warn:#b8860b;--warn-wash:#fbf3da;--warn-line:#ecd9a3;
    --ok:#198754;--ok-wash:#e7f4ee;
    --gold:#C98A14;
    --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Microsoft JhengHei',-apple-system,"PingFang TC",sans-serif;background:var(--surface-2);color:var(--ink);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}

  .app{display:grid;grid-template-columns:188px 1fr;grid-template-rows:52px 1fr;height:100vh;grid-template-areas:"side top" "side main"}
  /* ---------- sidebar ---------- */
  .side{grid-area:side;background:var(--side);color:var(--side-text);overflow-y:auto;font-size:13px}
  .side-brand{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
  .side-brand .logo{width:30px;height:30px;border-radius:7px;background:#eef2f6;color:#1f6feb;display:grid;place-items:center;font-weight:800;font-size:11px;letter-spacing:-.5px}
  .side-brand b{font-size:13px;color:#fff;font-weight:700}
  .side-brand span{font-size:11px;color:#9fb0c0;display:block}
  .side-group{padding:7px 14px 4px;font-size:11px;color:#7d8b99;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:7px;margin-top:4px}
  .side-item{padding:7px 14px 7px 30px;color:var(--side-text);cursor:pointer;transition:.15s}
  .side-item:hover{background:var(--side-2);color:#fff}
  .side-item.active{background:var(--side-active);color:#fff;font-weight:600;border-radius:0}
  /* ---------- topbar ---------- */
  .top{grid-area:top;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px}
  .top .ham{font-size:18px;color:var(--muted)}
  .top .np{display:flex;align-items:center;gap:8px;font-weight:800;color:#1f6feb;font-size:17px;letter-spacing:.5px}
  .top .title{font-weight:600;color:var(--ink)}
  .top .ver{font-size:11px;color:#fff;background:var(--ok);border-radius:5px;padding:2px 7px;font-weight:600}
  .top .vnum{font-size:11px;color:var(--faint)}
  .top .sp{flex:1}
  .top .user{display:flex;align-items:center;gap:9px}
  .top .user .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5b86e5,#36d1dc)}
  .top .user .nm{font-size:13px;font-weight:600;line-height:1.2}
  .top .user .dp{font-size:11px;color:var(--faint)}
  /* ---------- main ---------- */
  .main{grid-area:main;overflow:auto;padding:14px 18px 40px}
  .toolbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:12px;flex-wrap:wrap}
  .tb-label{font-size:13px;color:var(--muted);font-weight:600}
  .tb-select{border:1px solid var(--line-strong);border-radius:7px;padding:6px 10px;font-size:13px;background:#fff}
  .tb-btn{border:1px solid var(--line-strong);border-radius:7px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink);background:#fff}
  .tb-btn:hover{border-color:var(--blue);color:var(--blue)}
  .tb-btn.solid{background:var(--blue);color:#fff;border-color:var(--blue)}
  .tb-hint{margin-left:auto;font-size:12px;color:var(--faint)}

  .grid-wrap{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  table.sched{width:100%;border-collapse:collapse;font-size:12px}
  table.sched th{background:#eef1f4;border:1px solid var(--line);padding:8px 6px;font-weight:700;color:var(--muted);font-size:11px;text-align:center}
  table.sched td{border:1px solid #eef1f4;padding:0;vertical-align:top;height:46px}
  table.sched td.time{background:#f7f9fb;color:var(--muted);font-weight:600;text-align:center;width:58px;font-family:var(--mono)}
  .cell{height:100%;padding:5px 6px;font-size:11px;line-height:1.35;cursor:pointer;transition:filter .15s}
  .cell:hover{filter:brightness(.96)}
  .cell.empty{color:#c4ccd3}
  .cell.empty:hover{background:var(--blue-wash);color:var(--blue)}
  .cell.b-blue{background:#dbe7fb}
  .cell.b-teal{background:#d6efef}
  .cell.b-red{background:#f6dcdc}
  .cell.b-pink{background:#f7deea}
  .cell .nm{font-weight:700;color:var(--ink)}
  .cell .meta{color:var(--muted);font-size:10px}
  .cell .badge{display:inline-block;margin-top:2px;font-size:9px;font-weight:700;padding:0 5px;border-radius:999px;background:rgba(0,0,0,.06);color:#555}
  .cell .badge.no-sms{background:var(--danger-wash);color:var(--danger)}

  /* ---------- modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,28,38,.5);opacity:0;visibility:hidden;transition:.2s;z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;overflow:auto}
  .scrim.open{opacity:1;visibility:visible}
  .modal{background:#fff;border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.28);width:520px;max-width:100%;transform:translateY(-12px);transition:transform .22s;overflow:hidden}
  .scrim.open .modal{transform:translateY(0)}
  .m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .m-head h3{font-size:17px;font-weight:700}
  .m-x{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--muted);font-size:20px}
  .m-x:hover{background:var(--surface-2);color:var(--ink)}
  .m-body{padding:18px 20px;max-height:64vh;overflow:auto}
  .m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;justify-content:flex-end}

  .fld{margin-bottom:15px}
  .fld>label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .fld .sub{font-size:12px;color:var(--faint);margin-bottom:6px}
  .ctrl{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:8px;font-size:13.5px;background:#fff;color:var(--ink)}
  .ctrl:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-wash)}
  textarea.ctrl{resize:vertical;min-height:84px;line-height:1.6}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .name-row{display:flex;align-items:center;gap:10px}
  .name-row .nm-val{flex:1;font-weight:700}
  .mini-btn{background:var(--blue);color:#fff;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600}
  .mini-btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
  .mini-btn.yellow{background:#f4d44d;color:#7a5b00}

  /* alert */
  .alert{display:flex;gap:10px;padding:13px 14px;border-radius:9px;margin-bottom:16px;background:var(--danger-wash);border:1px solid var(--danger-line)}
  .alert .ic{font-size:18px;line-height:1.2}
  .alert .t{font-weight:700;color:var(--danger);font-size:14px}
  .alert .d{font-size:13px;color:#9a3b3b;margin-top:2px}
  .alert.warn{background:var(--warn-wash);border-color:var(--warn-line)}
  .alert.warn .t{color:#8a6400}.alert.warn .d{color:#8a6d2f}

  /* template selector */
  .tpl-bar{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:14px}
  .tpl-bar .tt{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .tpl-bar .tt .lk{margin-left:auto;font-size:11px;font-weight:600;color:var(--blue);cursor:pointer}
  .tpl-select-row{display:flex;gap:8px;align-items:center}
  .tpl-select{flex:1;padding:8px 10px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;background:#fff}
  .tpl-select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-wash)}
  .pin-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .pin-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;border:1px solid var(--line-strong);background:#fff;color:var(--ink)}
  .pin-chip:hover{border-color:var(--blue);color:var(--blue)}
  .pin-chip.active{background:var(--blue-wash);border-color:var(--blue);color:var(--blue-deep)}
  .pin-chip .s{color:var(--gold)}
  .pin-empty{font-size:11.5px;color:var(--faint)}

  .tok{background:var(--blue-wash);color:var(--blue-deep);border-radius:4px;padding:0 3px;font-weight:600}
  .render-box{border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;min-height:60px;margin-top:8px}
  .char-line{display:flex;justify-content:space-between;font-size:12px;color:var(--faint);margin-top:7px}
  .char-line b{color:var(--muted)}
  .char-line .over{color:var(--danger);font-weight:700}

  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f2933;color:#fff;font-size:13px;font-weight:550;padding:11px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;visibility:hidden;transition:.22s;z-index:90}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

  @media (max-width:820px){.app{grid-template-columns:0 1fr}.side{display:none}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- sidebar -->
  <aside class="side">
    <div class="side-brand"><div class="logo">光澤</div><div><b>三重光澤</b><span>光澤</span></div></div>
    <div class="side-group">📋 預約</div>
    <div class="side-item active">預約操作</div>
    <div class="side-item">預約查詢</div>
    <div class="side-group">👤 會員</div>
    <div class="side-item">會員維護</div>
    <div class="side-item">會員報到</div>
    <div class="side-group">💳 結帳</div>
    <div class="side-item">結帳收銀</div>
    <div class="side-item">結帳查詢</div>
    <div class="side-group">🛠 設定</div>
    <div class="side-item" id="goSetting">簡訊模板設定 ↗</div>
  </aside>

  <!-- topbar -->
  <header class="top">
    <span class="ham">☰</span>
    <span class="np">NPOS</span>
    <span class="title">預約操作</span>
    <span class="ver">正式</span><span class="vnum">v2.48.0</span>
    <span class="sp"></span>
    <div class="user"><div class="av"></div><div><div class="nm">鄭楷錚</div><div class="dp">資訊軟體開發課-台灣</div></div></div>
  </header>

  <!-- main -->
  <main class="main">
    <div class="toolbar">
      <span class="tb-label">切換門市：</span>
      <select class="tb-select"><option>三重光澤</option></select>
      <button class="tb-btn">表格設定</button>
      <button class="tb-btn solid">美療</button>
      <button class="tb-btn">門診</button>
      <button class="tb-btn">🔄 刷新資料</button>
      <button class="tb-btn">‹</button>
      <select class="tb-select"><option>2026/06/26（週五）</option></select>
      <button class="tb-btn">›</button>
      <button class="tb-btn">今天</button>
      <span class="tb-hint">點任一床位格 → 建立預約 → 發出簡訊</span>
    </div>

    <div class="grid-wrap">
      <table class="sched">
        <thead><tr id="schedHead"></tr></thead>
        <tbody id="schedBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ========== 建立預約 Modal ========== -->
<div class="scrim" id="apptScrim">
  <div class="modal">
    <div class="m-head"><h3>建立預約</h3><button class="m-x" data-close="apptScrim">&times;</button></div>
    <div class="m-body">
      <div class="fld">
        <label>姓名</label>
        <div class="name-row"><div class="nm-val" id="apName">GT0011059 鄭楷錚 09/19</div><button class="mini-btn">重置</button></div>
      </div>
      <div class="fld"><label>床位</label><select class="ctrl" id="apBed"><option>肌動減脂</option><option>冷凍減脂</option><option>貴妃減脂</option><option>超導1</option></select></div>
      <div class="fld">
        <label>預約項目</label>
        <div class="row2">
          <div><div class="sub">療程類型</div><select class="ctrl" id="apType"><option>岩盤浴</option><option>超音波導入</option><option>電波拉提</option></select></div>
          <div><div class="sub">施做療程</div><select class="ctrl" id="apItem"><option>臉-超導(60分)</option><option>全身-岩盤浴(90分)</option></select></div>
        </div>
      </div>
      <div class="fld">
        <label>預約日期 / 時間</label>
        <div class="row2">
          <input type="date" class="ctrl" id="apDate" value="2026-06-26">
          <div class="row2"><select class="ctrl" id="apHour"></select><select class="ctrl" id="apMin"><option>00</option><option>10</option><option>20</option><option>30</option><option>40</option><option>50</option></select></div>
        </div>
      </div>
      <div class="fld"><label>備註</label><textarea class="ctrl" id="apNote" placeholder="預約備註…"></textarea></div>
    </div>
    <div class="m-foot">
      <button class="mini-btn yellow">貼上</button>
      <span style="flex:1"></span>
      <button class="mini-btn ghost" data-close="apptScrim">關閉</button>
      <button class="mini-btn" id="apSave">儲存</button>
    </div>
  </div>
</div>

<!-- ========== 發出簡訊內容 Modal ========== -->
<div class="scrim" id="smsScrim">
  <div class="modal">
    <div class="m-head"><h3>發出簡訊內容</h3><button class="m-x" data-close="smsScrim">&times;</button></div>
    <div class="m-body">
      <div id="smsAlert"></div>

      <!-- 多模板選擇（彈窗內下拉 + 釘選列） -->
      <div class="tpl-bar">
        <div class="tt">💬 套用簡訊模板 <span class="lk" id="manageTpl">管理模板 ↗</span></div>
        <div class="tpl-select-row">
          <select class="tpl-select" id="tplSelect"></select>
        </div>
        <div class="pin-chips" id="pinChips"></div>
      </div>

      <div class="fld">
        <label>簡訊內容</label>
        <div class="sub">預設帶入簡訊模板或已設定簡訊內容；可直接編輯。參數會自動帶入預約資料。</div>
        <textarea class="ctrl" id="smsContent"></textarea>
        <div class="render-box" id="smsRender"></div>
        <div class="char-line"><span></span><span>字數限制：<b id="smsChars">0</b>/70字 · 預估 <b id="smsSegs">0</b> 則</span></div>
      </div>

      <div class="fld"><label>發送時間</label><input type="datetime-local" class="ctrl" id="smsTime" value="2026-06-26T09:00"></div>
    </div>
    <div class="m-foot">
      <button class="mini-btn ghost" id="smsCancel">取消簡訊</button>
      <button class="mini-btn" id="smsSend">發送</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  /* ---------- storage (graceful fallback) ---------- */
  var mem={};
  var store={get:function(k){try{return localStorage.getItem(k);}catch(e){return mem[k]||null;}},
             set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}};
  var KEY={custom:"npos_tpl_custom",pins:"npos_tpl_pins",recent:"npos_tpl_recent",last:"npos_tpl_last"};
  function loadJSON(k,d){try{var v=store.get(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function saveJSON(k,v){store.set(k,JSON.stringify(v));}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  /* ---------- shared template model (與簡訊設定頁共用 localStorage) ---------- */
  var builtin=[
    {id:"b1",name:"標準預約提醒",desc:"通用預約確認簡訊",
     body:"提醒您有預約【{{門市名稱}}】{{預約日期}}{{預約時間}}{{門市地址}}，有任何疑問請撥打{{門市電話}}，{{門市名稱}}關心您。"},
    {id:"b2",name:"醫美－療程提醒",desc:"醫美療程前報到提醒",
     body:"{{會員姓名}}您好，提醒您於{{門市名稱}}的{{療程}}預約：{{預約日期}}{{預約時間}}。請提前30分鐘蒞臨現場報到。洽詢{{門市電話}}。"},
    {id:"b4",name:"中醫－門診提醒",desc:"中醫門診當日提醒",
     body:"{{會員姓名}}您好，提醒您今日於{{門市名稱}}有門診預約{{預約時間}}，請依現場叫號順序看診。洽詢{{門市電話}}。"}
  ];
  var custom=loadJSON(KEY.custom,[]);
  var pins=loadJSON(KEY.pins,[]);
  var recent=loadJSON(KEY.recent,[]);
  var lastId=store.get(KEY.last)||null;
  function allTpl(){return builtin.concat(custom);}
  function tplById(id){var a=allTpl();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
  function smsSegments(len){if(len===0)return 0;if(len<=70)return 1;return Math.ceil(len/67);}

  /* ---------- 排程表格 ---------- */
  var BEDS=["AB1","AB2","AB3(清道夫)","IV","肌動減脂","冷凍減脂","貴妃減脂","超導1"];
  var TIMES=["17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
  var bookings={
    "肌動減脂|17:00":{cls:"b-blue",name:"鄭楷錚",memberId:"GT0011059",phone:"0912345678",item:"臉-超導(60分)",noSms:false},
    "冷凍減脂|17:30":{cls:"b-teal",name:"葉姵岑",memberId:"GT0019988",phone:"0979896177",item:"超音波導入",noSms:false},
    "貴妃減脂|18:00":{cls:"b-red",name:"王曉玲",memberId:"GT0020012",phone:"0975263248",item:"超音波導入",noSms:true},
    "超導1|19:30":{cls:"b-pink",name:"游庚霖",memberId:"GT0033226",phone:"0933226021",item:"超音波導入",noSms:false},
    "AB1|18:00":{cls:"b-blue",name:"林佳諭",memberId:"GT0087349",phone:"0987349500",item:"杏仁酸",noSms:false}
  };

  var STORE={名稱:"三重光澤",地址:"三重區正義北路122號",電話:"02-29850300"};

  function renderSched(){
    var head=document.getElementById("schedHead");
    head.innerHTML='<th class="time">床位</th>'+BEDS.map(function(b){return '<th>'+esc(b)+'</th>';}).join("");
    var body=document.getElementById("schedBody"),h="";
    TIMES.forEach(function(t){
      h+='<tr><td class="time">'+t+'</td>';
      BEDS.forEach(function(b){
        var key=b+"|"+t,bk=bookings[key];
        if(bk){
          h+='<td><div class="cell '+bk.cls+'" data-book="'+esc(key)+'"><div class="nm">'+esc(bk.name)+'</div><div class="meta">'+esc(bk.item)+'</div>'+
             (bk.noSms?'<span class="badge no-sms">不收簡訊</span>':'<span class="badge">'+esc(bk.phone)+'</span>')+'</div></td>';
        }else{
          h+='<td><div class="cell empty" data-new="'+esc(key)+'">＋</div></td>';
        }
      });
      h+='</tr>';
    });
    body.innerHTML=h;
  }
  renderSched();

  /* hour options */
  var apHour=document.getElementById("apHour");
  for(var hh=9;hh<=21;hh++){var o=document.createElement("option");o.value=("0"+hh).slice(-2);o.textContent=("0"+hh).slice(-2);if(hh===17)o.selected=true;apHour.appendChild(o);}

  /* ---------- modal helpers ---------- */
  function openScrim(id){document.getElementById(id).classList.add("open");}
  function closeScrim(id){document.getElementById(id).classList.remove("open");}
  document.querySelectorAll("[data-close]").forEach(function(b){b.addEventListener("click",function(){closeScrim(b.getAttribute("data-close"));});});
  document.querySelectorAll(".scrim").forEach(function(s){s.addEventListener("click",function(e){if(e.target===s)closeScrim(s.id);});});
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeScrim("apptScrim");closeScrim("smsScrim");}});

  /* ---------- 目前預約上下文（給參數替換用） ---------- */
  var ctx=null;
  function buildCtx(bk,timeStr,dateStr){
    return {
      "會員姓名":bk.name,"門市名稱":STORE.名稱,"門市地址":STORE.地址,"門市電話":STORE.電話,
      "預約日期":dateStr,"預約時間":timeStr,"療程":bk.item,"班別":"","醫師姓名":"","noSms":!!bk.noSms,
      "phone":bk.phone,"memberId":bk.memberId
    };
  }
  function resolved(body){return body.replace(/\{\{(.+?)\}\}/g,function(m,k){if(ctx&&ctx[k]!==undefined&&ctx[k]!=="")return ctx[k];if(ctx&&ctx[k]==="")return "";return m;});}
  function renderTokens(body){
    var out="",re=/\{\{(.+?)\}\}/g,last=0,m;
    while((m=re.exec(body))){
      out+=esc(body.slice(last,m.index));var k=m[1];
      if(ctx&&ctx[k]!==undefined&&ctx[k]!=="")out+='<span class="tok">'+esc(ctx[k])+'</span>';
      else out+='<span class="tok">'+esc(m[0])+'</span>';
      last=re.lastIndex;
    }
    out+=esc(body.slice(last));return out;
  }

  /* ---------- SMS modal 內容更新 ---------- */
  var smsContent=document.getElementById("smsContent"),smsRender=document.getElementById("smsRender");
  var smsChars=document.getElementById("smsChars"),smsSegs=document.getElementById("smsSegs");

  function refreshRender(){
    var body=smsContent.value;
    smsRender.innerHTML=renderTokens(body);
    var plain=resolved(body);
    smsChars.textContent=plain.length;smsChars.className=plain.length>70?"over":"";
    smsSegs.textContent=smsSegments(plain.length);
  }
  smsContent.addEventListener("input",refreshRender);

  function applyTemplate(id,opts){
    opts=opts||{};var t=tplById(id);if(!t)return;
    lastId=id;store.set(KEY.last,id);
    recent=recent.filter(function(x){return x!==id;});recent.unshift(id);recent=recent.slice(0,5);saveJSON(KEY.recent,recent);
    smsContent.value=t.body;refreshRender();
    document.getElementById("tplSelect").value=id;
    renderPinChips();
    if(!opts.silent)toast("已套用「"+t.name+"」並帶入預約資料");
  }

  /* dropdown groups: 釘選 / 最近 / 全部 */
  function renderTplSelect(){
    var sel=document.getElementById("tplSelect");
    function opt(t){return '<option value="'+t.id+'">'+esc(t.name)+(t.id.indexOf("c")===0?'（自訂）':'')+'</option>';}
    var pinList=allTpl().filter(function(t){return pins.indexOf(t.id)>-1;});
    var recentList=recent.map(tplById).filter(function(t){return t&&pins.indexOf(t.id)<0;});
    var used=pinList.map(function(t){return t.id;}).concat(recentList.map(function(t){return t.id;}));
    var rest=allTpl().filter(function(t){return used.indexOf(t.id)<0;});
    var h='<option value="">— 請選擇模板 —</option>';
    if(pinList.length)h+='<optgroup label="★ 釘選">'+pinList.map(opt).join("")+'</optgroup>';
    if(recentList.length)h+='<optgroup label="最近使用">'+recentList.map(opt).join("")+'</optgroup>';
    h+='<optgroup label="全部模板">'+rest.map(opt).join("")+'</optgroup>';
    sel.innerHTML=h;
    if(lastId&&tplById(lastId))sel.value=lastId;
  }
  document.getElementById("tplSelect").addEventListener("change",function(){if(this.value)applyTemplate(this.value);});

  function renderPinChips(){
    var box=document.getElementById("pinChips");
    var pinList=allTpl().filter(function(t){return pins.indexOf(t.id)>-1;});
    if(!pinList.length){box.innerHTML='<span class="pin-empty">尚無釘選模板，可至「管理模板」釘選常用模板以便快速套用。</span>';return;}
    box.innerHTML=pinList.map(function(t){return '<button class="pin-chip'+(t.id===lastId?' active':'')+'" data-apply="'+t.id+'"><span class="s">★</span>'+esc(t.name)+'</button>';}).join("");
  }
  document.getElementById("pinChips").addEventListener("click",function(e){var b=e.target.closest("[data-apply]");if(b)applyTemplate(b.getAttribute("data-apply"));});

  function renderAlert(){
    var box=document.getElementById("smsAlert");
    if(ctx&&ctx.noSms){
      box.innerHTML='<div class="alert"><div class="ic">⊘</div><div><div class="t">發送受阻</div><div class="d">客人已設定「不要發送簡訊」，強制發送可能引起客訴。</div></div></div>';
    }else box.innerHTML="";
  }

  /* ---------- 開啟 SMS modal ---------- */
  function openSms(bk,timeStr){
    var dateStr="06/26(五)";
    ctx=buildCtx(bk,timeStr,dateStr);
    renderAlert();renderTplSelect();renderPinChips();
    document.getElementById("smsTime").value="2026-06-26T09:00";
    var useId=(lastId&&tplById(lastId))?lastId:builtin[0].id;
    applyTemplate(useId,{silent:true});
    openScrim("smsScrim");
  }

  /* ---------- grid 點擊 ---------- */
  var pendingNew=null;
  document.getElementById("schedBody").addEventListener("click",function(e){
    var bookEl=e.target.closest("[data-book]");
    if(bookEl){var key=bookEl.getAttribute("data-book"),bk=bookings[key],t=key.split("|")[1];openSms(bk,t);return;}
    var newEl=e.target.closest("[data-new]");
    if(newEl){
      var k=newEl.getAttribute("data-new");pendingNew=k;
      var parts=k.split("|");if(BEDS.indexOf(parts[0])>-1){var bedSel=document.getElementById("apBed");for(var i=0;i<bedSel.options.length;i++){if(bedSel.options[i].value===parts[0])bedSel.selectedIndex=i;}}
      var hm=parts[1].split(":");document.getElementById("apHour").value=hm[0];document.getElementById("apMin").value=hm[1];
      openScrim("apptScrim");
    }
  });

  /* 建立預約 → 儲存 → 發出簡訊 */
  document.getElementById("apSave").addEventListener("click",function(){
    closeScrim("apptScrim");
    var timeStr=document.getElementById("apHour").value+":"+document.getElementById("apMin").value;
    var bk={cls:"b-blue",name:"鄭楷錚",memberId:"GT0011059",phone:"0912345678",item:document.getElementById("apItem").value,noSms:false};
    if(pendingNew){bookings[pendingNew]=bk;renderSched();}
    toast("預約已建立，請確認簡訊內容");
    setTimeout(function(){openSms(bk,timeStr);},250);
  });

  /* SMS 發送 / 取消 */
  document.getElementById("smsSend").addEventListener("click",function(){
    if(!smsContent.value.trim()){toast("請輸入簡訊內容");return;}
    var t=tplById(lastId);
    closeScrim("smsScrim");
    toast("簡訊已排程發送（"+resolved(smsContent.value).length+" 字"+(t?" · "+t.name:"")+"）");
  });
  document.getElementById("smsCancel").addEventListener("click",function(){closeScrim("smsScrim");toast("已取消發送簡訊");});

  /* 前往設定頁 */
  function gotoSetting(){location.href="模板簡訊設定教學.html";}
  document.getElementById("goSetting").addEventListener("click",gotoSetting);
  document.getElementById("manageTpl").addEventListener("click",gotoSetting);

  /* ---------- toast ---------- */
  var toastTimer;
  function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove("show");},2600);}
})();
</script>
</body>
</html>
